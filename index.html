<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIXEL ESTATES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg:        #0a0a0f;
    --panel:     #12121a;
    --border:    #2a2a3d;
    --accent:    #f7c948;
    --green:     #3ddc84;
    --red:       #ff4f5e;
    --blue:      #4fc3f7;
    --purple:    #c084fc;
    --orange:    #fb923c;
    --pink:      #f472b6;
    --teal:      #2dd4bf;
    --brown:     #a16207;
    --text:      #e8e8f0;
    --dim:       #6b7280;
    --cell:      18px;
    --pixel:     2px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .screen { display: none; width: 100%; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ══ TITLE ══ */
  #screen-title {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
    gap: 16px; padding: 24px 16px; text-align: center;
  }
  @media (min-width: 480px) {
    #screen-title { gap: 24px; padding: 40px 20px; }
  }
  .title-logo {
    font-size: clamp(18px, 4vw, 32px);
    color: var(--accent);
    text-shadow: 4px 4px 0 #7a6000, 8px 8px 0 #3d3000;
    letter-spacing: 4px;
    animation: titlePulse 2s ease-in-out infinite;
    line-height: 1.6;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 4px 4px 0 #7a6000, 8px 8px 0 #3d3000; }
    50%      { text-shadow: 4px 4px 0 #b38f00, 8px 8px 0 #7a6000, 0 0 30px rgba(247,201,72,.4); }
  }
  .title-sub { color: var(--green); font-size: 9px; letter-spacing: 3px; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .pixel-house { font-size: 40px; animation: bounce 1s ease-in-out infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

  /* ══ SETUP ══ */
  .setup-panel {
    background: var(--panel);
    border: var(--pixel) solid var(--border);
    box-shadow: 4px 4px 0 var(--border);
    padding: 24px;
    width: min(480px, 94vw);
    display: flex; flex-direction: column; gap: 16px;
  }
  .setup-panel h2 { color: var(--accent); font-size: 11px; text-align: center; margin-bottom: 4px; }
  .player-row {
    display: flex; align-items: center; gap: 10px;
    border: var(--pixel) solid var(--border);
    padding: 10px 12px; background: #0d0d14;
  }
  .player-row .p-icon { font-size: 22px; }
  .player-name-input {
    background: transparent; border: none;
    border-bottom: var(--pixel) solid var(--dim);
    color: var(--text); font-family: 'Press Start 2P', monospace;
    font-size: 9px; padding: 4px 2px; flex: 1; outline: none;
  }
  .player-name-input:focus { border-bottom-color: var(--accent); }
  .color-dot { width: 14px; height: 14px; border: var(--pixel) solid #fff; }
  .player-row .remove-btn {
    background: none; border: none; color: var(--red); cursor: pointer;
    font-size: 14px; font-family: 'Press Start 2P', monospace; padding: 0 2px;
  }

  /* ══ BUTTONS ══ */
  .btn {
    background: var(--accent); color: #000; border: none;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    padding: 12px 20px; cursor: pointer;
    box-shadow: 4px 4px 0 #7a6000;
    transition: transform .1s, box-shadow .1s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .btn:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #7a6000; }
  .btn:active { transform: translate(2px,2px);   box-shadow: 2px 2px 0 #7a6000; }
  .btn-sm  { font-size: 8px; padding: 8px 14px; box-shadow: 3px 3px 0 #7a6000; }
  .btn-xs  { font-size: 7px; padding: 5px 8px;  box-shadow: 2px 2px 0 #7a6000; }
  .btn-green  { background: var(--green);  box-shadow: 4px 4px 0 #1a6b3a; color:#000; }
  .btn-green:hover  { box-shadow: 6px 6px 0 #1a6b3a; }
  .btn-green:active { box-shadow: 2px 2px 0 #1a6b3a; }
  .btn-red    { background: var(--red);    color:#fff; box-shadow: 4px 4px 0 #7a0010; }
  .btn-red:hover    { box-shadow: 6px 6px 0 #7a0010; }
  .btn-red:active   { box-shadow: 2px 2px 0 #7a0010; }
  .btn-blue   { background: var(--blue);   color:#000; box-shadow: 4px 4px 0 #0a5f80; }
  .btn-blue:hover   { box-shadow: 6px 6px 0 #0a5f80; }
  .btn-purple { background: var(--purple); color:#000; box-shadow: 4px 4px 0 #4a1a80; }
  .btn-purple:hover { box-shadow: 6px 6px 0 #4a1a80; }
  .btn-orange { background: var(--orange); color:#000; box-shadow: 4px 4px 0 #7a3a00; }
  .btn-orange:hover { box-shadow: 6px 6px 0 #7a3a00; }
  .btn-dim    { background: var(--dim);    color:#fff; box-shadow: 4px 4px 0 #2a2a2a; }
  .btn-dim:hover    { box-shadow: 6px 6px 0 #2a2a2a; }
  .btn-mortgaged { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); box-shadow: 2px 2px 0 #7a0010; }
  .add-player-btn {
    background: none; border: var(--pixel) dashed var(--dim);
    color: var(--dim); font-family: 'Press Start 2P', monospace;
    font-size: 9px; padding: 10px; cursor: pointer; width: 100%; transition: all .2s;
  }
  .add-player-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ══ GAME SCREEN ══ */
  #screen-game { justify-content: flex-start; align-items: stretch; flex-direction: column; padding: 0; min-height: 100vh; }
  .game-layout {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto;
    gap: 0; width: 100%; max-width: 1200px;
    margin: 0 auto; padding: 8px; flex: 1; align-items: start;
  }
  .board-wrap { grid-column: 1; grid-row: 1; justify-self: center; overflow-x: auto; max-width: 100%; }
  .board {
    display: grid;
    grid-template-columns: repeat(11, var(--cell));
    grid-template-rows: repeat(11, var(--cell));
    border: 3px solid var(--accent);
    box-shadow: 0 0 0 1px #000, 6px 6px 0 rgba(247,201,72,.3);
    background: #0d1a0d; image-rendering: pixelated; position: relative;
  }
  .cell {
    border: 1px solid #1a2a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 5px; position: relative; cursor: default; overflow: hidden; transition: filter .2s;
  }
  .cell:hover { filter: brightness(1.3); }
  .cell-color-bar { width: 100%; height: 5px; position: absolute; top: 0; left: 0; }
  .cell-name {
    font-family: 'VT323', monospace; font-size: 7px; text-align: center;
    color: #ccc; line-height: 1.1; padding: 0 1px; margin-top: 6px;
  }
  .cell-price { font-family: 'VT323', monospace; font-size: 7px; color: var(--accent); position: absolute; bottom: 1px; }
  .cell-corner { background: #0a1f0a; }
  .cell-corner .corner-label { font-family: 'VT323', monospace; font-size: 9px; color: var(--green); text-align: center; line-height: 1.2; }
  .cell-chance    { background: #1a150a; }
  .cell-community { background: #0a1015; }
  .cell-tax       { background: #150a0a; }
  .cell-railroad  { background: #0f0f0f; }
  .cell-utility   { background: #0a0f0a; }
  .cell.mortgaged-cell { opacity: 0.45; }
  .cell.mortgaged-cell::after {
    content: 'MRTG';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'VT323', monospace; font-size: 8px; color: var(--red);
    background: rgba(0,0,0,.7); padding: 1px 2px; pointer-events: none; z-index: 5;
  }
  .board-center {
    grid-column: 2 / 11; grid-row: 2 / 11;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0d1a0d; border: 1px solid #1a2a1a; position: relative; gap: 4px;
  }
  .board-title { font-size: clamp(8px, 1.5vw, 14px); color: var(--accent); letter-spacing: 3px; text-align: center; text-shadow: 2px 2px 0 #7a6000; }
  .board-subtitle { font-family: 'VT323', monospace; font-size: clamp(10px, 2vw, 16px); color: var(--green); letter-spacing: 2px; }
  .dice-area { display: flex; gap: 8px; margin-top: 8px; }
  .die {
    width: 32px; height: 32px; background: #1a1a2e;
    border: 2px solid var(--accent); box-shadow: 3px 3px 0 #7a6000;
    display: flex; align-items: center; justify-content: center; font-size: 18px; transition: transform .1s;
  }
  .die.rolling { animation: dieRoll .4s ease-in-out; }
  @keyframes dieRoll {
    0%   { transform: rotate(0deg)   scale(1); }
    25%  { transform: rotate(90deg)  scale(1.2); }
    50%  { transform: rotate(180deg) scale(.9); }
    75%  { transform: rotate(270deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .tokens-layer { position: absolute; inset: 0; pointer-events: none; }
  .token {
    position: absolute; width: 14px; height: 14px; border-radius: 0;
    border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
    font-size: 8px; transition: all .5s ease; z-index: 10; image-rendering: pixelated;
  }
  .owner-dot { width: 5px; height: 5px; position: absolute; bottom: 2px; right: 2px; }
  .house-icon { position: absolute; bottom: 2px; left: 2px; font-size: 6px; }

  /* ══ SIDEBARS ══ */
  .side-left  { grid-column: 1; grid-row: 2; padding: 0; }
  .side-right { grid-column: 1; grid-row: 3; padding: 0; }
  .side-left, .side-right { display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; }

  .player-card {
    background: var(--panel); border: 2px solid var(--border);
    padding: 10px 12px; box-shadow: 3px 3px 0 var(--border);
    transition: border-color .3s, box-shadow .3s;
    flex: 1; min-width: 140px;
  }
  .player-card.active-turn {
    border-color: var(--accent);
    box-shadow: 3px 3px 0 var(--accent), 0 0 12px rgba(247,201,72,.2);
  }
  .player-card.bankrupt { opacity: .4; }
  .pc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pc-token  { font-size: 18px; }
  .pc-name   { font-size: 8px; color: var(--text); flex: 1; }
  .pc-tag    { font-size: 7px; padding: 2px 5px; border: 1px solid; white-space: nowrap; }
  .pc-money  { font-size: 11px; color: var(--green); margin-bottom: 4px; }
  .pc-props  { font-family: 'VT323', monospace; font-size: 11px; color: var(--dim); }
  .pc-status { font-size: 7px; margin-top: 5px; padding: 3px 6px; display: inline-block; }
  .status-jail    { background: #3d0a0a; color: var(--red);   border: 1px solid var(--red); }
  .status-active  { background: #0a3d1a; color: var(--green); border: 1px solid var(--green); }
  .status-waiting { background: #1a1a1a; color: var(--dim);   border: 1px solid var(--dim); }

  .log-panel {
    background: var(--panel); border: 2px solid var(--border);
    flex: 1; min-width: 140px; min-height: 100px; max-height: 180px;
    overflow-y: auto; padding: 8px 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .log-entry { font-family: 'VT323', monospace; font-size: 13px; padding: 2px 0; border-bottom: 1px solid #1a1a2a; color: #aaa; line-height: 1.3; }
  .log-entry.log-event    { color: var(--accent); }
  .log-entry.log-buy      { color: var(--green); }
  .log-entry.log-rent     { color: var(--red); }
  .log-entry.log-chance   { color: var(--purple); }
  .log-entry.log-jail     { color: var(--orange); }
  .log-entry.log-bank     { color: var(--blue); }
  .log-entry.log-trade    { color: var(--pink); }
  .log-entry.log-mortgage { color: var(--teal); }

  .bottom-bar {
    grid-column: 1; grid-row: 4;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 12px;
    border-top: 2px solid var(--border); background: var(--panel);
    margin-top: 8px; flex-wrap: wrap;
    position: sticky; bottom: 0; z-index: 100;
  }
  .turn-info { font-size: 9px; color: var(--accent); text-align: center; margin-right: 6px; }

  /* ══ MODALS ══ */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 3px solid var(--accent);
    box-shadow: 6px 6px 0 var(--accent); padding: 16px;
    max-width: 520px; width: 100%;
    display: flex; flex-direction: column; gap: 14px;
    animation: popIn .2s ease-out;
    max-height: 92vh; overflow-y: auto;
  }
  @media (min-width: 560px) {
    .modal { padding: 24px; }
  }
  @keyframes popIn { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-size: 12px; color: var(--accent); text-align: center; letter-spacing: 2px; }
  .modal-body  { font-family: 'VT323', monospace; font-size: 16px; color: var(--text); text-align: center; line-height: 1.5; }
  .modal-card  { border: 2px solid; padding: 14px; text-align: center; font-family: 'VT323', monospace; font-size: 15px; line-height: 1.5; }
  .modal-card.chance    { border-color: var(--purple); color: var(--purple); background: #1a0a2e; }
  .modal-card.community { border-color: var(--blue);   color: var(--blue);   background: #0a1020; }
  .modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .prop-color-banner { height: 12px; width: 100%; margin-bottom: 4px; }
  .prop-detail { font-family: 'VT323', monospace; font-size: 14px; color: var(--dim); }
  .prop-detail span { color: var(--text); }

  /* ══ TRADE MODAL SPECIFIC ══ */
  .trade-layout {
    display: grid; grid-template-columns: 1fr; gap: 8px; align-items: start;
  }
  .trade-col { display: flex; flex-direction: column; gap: 6px; }
  .trade-col h3 { font-size: 8px; text-align: center; padding: 4px; }
  .trade-prop-list { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
  .trade-prop-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; cursor: pointer;
    border: 1px solid var(--border); background: #0d0d14;
    font-family: 'VT323', monospace; font-size: 12px;
    transition: background .15s;
  }
  .trade-prop-item:hover  { background: #1a1a2a; }
  .trade-prop-item.selected { background: #1a2a1a; border-color: var(--green); }
  .trade-prop-item .tpi-dot { width: 8px; height: 8px; flex-shrink: 0; }
  .trade-prop-item .tpi-mortg { font-size: 9px; color: var(--red); margin-left: auto; }
  .trade-cash-input {
    background: #0d0d14; border: 1px solid var(--border);
    color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 9px;
    padding: 6px; width: 100%; outline: none; text-align: center;
  }
  .trade-cash-input:focus { border-color: var(--accent); }
  .trade-label { font-family: 'VT323', monospace; font-size: 12px; color: var(--dim); text-align: center; }

  /* ══ MORTGAGE MODAL ══ */
  .mort-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .mort-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border: 1px solid var(--border);
    background: #0d0d14; font-family: 'VT323', monospace; font-size: 13px;
  }
  .mort-item .mi-dot  { width: 10px; height: 10px; flex-shrink: 0; }
  .mort-item .mi-name { flex: 1; }
  .mort-item .mi-val  { color: var(--accent); margin-right: 6px; }
  .mort-item .mi-status { font-size: 10px; }
  .mort-item.is-mortgaged { opacity: .7; background: #1a0a0a; }

  /* ══ WIN SCREEN ══ */
  #screen-win {
    background: radial-gradient(ellipse at center, #1a1a00 0%, #0a0a0f 70%);
    gap: 20px; padding: 40px 20px; text-align: center;
  }
  .win-title { font-size: clamp(14px, 3vw, 24px); color: var(--accent); text-shadow: 4px 4px 0 #7a6000; animation: titlePulse 1s ease-in-out infinite; }
  .win-token { font-size: 60px; animation: bounce .8s ease-in-out infinite alternate; }
  .win-name  { font-size: 14px; color: var(--green); }
  .win-money { font-size: 11px; color: var(--text); }

  /* ══ RESPONSIVE — mobile-first ══ */

  /* hide cell text on smallest screens */
  .cell-name  { display: none; }
  .cell-price { display: none; }

  /* touch-friendly button targets on mobile */
  .btn    { min-height: 44px; }
  .btn-sm { min-height: 40px; }
  .btn-xs { min-height: 36px; }

  @media (min-width: 480px) {
    :root { --cell: 22px; }
    .cell-name  { display: block; }
    .cell-price { display: block; }
  }

  @media (min-width: 900px) {
    :root { --cell: 28px; }
    .game-layout {
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto 1fr auto;
      padding: 12px;
    }
    .board-wrap { grid-column: 2; grid-row: 1 / 3; overflow-x: visible; }
    .side-left  { grid-column: 1; grid-row: 1 / 3; padding-right: 10px; flex-direction: column; flex-wrap: nowrap; }
    .side-right { grid-column: 3; grid-row: 1 / 3; padding-left: 10px;  flex-direction: column; flex-wrap: nowrap; }
    .bottom-bar { grid-column: 1 / 4; grid-row: 3; position: static; }
    .player-card { flex: none; min-width: 0; }
    .log-panel   { flex: 1; min-width: 0; max-height: 220px; }
    .trade-layout { grid-template-columns: 1fr auto 1fr; }
    .trade-divider { display: flex; align-items: center; justify-content: center; font-size: 20px; padding-top: 20px; }
    .btn    { min-height: 0; }
    .btn-sm { min-height: 0; }
    .btn-xs { min-height: 0; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen active">
  <div class="pixel-house">🏠</div>
  <div class="title-logo">PIXEL<br>ESTATES</div>
  <div class="title-sub">▶ PRESS START ◀</div>
  <div class="setup-panel">
    <h2>⚙ PLAYER SETUP</h2>
    <div id="player-list"></div>
    <button class="add-player-btn" id="btn-add-player">+ ADD PLAYER</button>
    <button class="btn" id="btn-start-game">▶ START GAME</button>
  </div>
  <div style="font-family:VT323,monospace;font-size:13px;color:var(--dim);text-align:center;margin-top:8px;">BUY · TRADE · MORTGAGE · DOMINATE</div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-layout">
    <div class="side-left"  id="side-left"></div>
    <div class="board-wrap">
      <div class="board" id="board">
        <div class="tokens-layer" id="tokens-layer"></div>
      </div>
    </div>
    <div class="side-right" id="side-right"></div>
    <div class="bottom-bar">
      <div class="turn-info" id="turn-info">PLAYER 1'S TURN</div>
      <button class="btn btn-green btn-sm" id="btn-roll">🎲 ROLL DICE</button>
      <button class="btn btn-blue  btn-sm" id="btn-end-turn"   style="display:none">⏭ END TURN</button>
      <button class="btn btn-dim   btn-sm" id="btn-bail-jail"  style="display:none">💰 BAIL $50</button>
      <button class="btn btn-orange btn-sm" id="btn-trade"     style="display:none">🤝 TRADE</button>
      <button class="btn btn-purple btn-sm" id="btn-mortgage"                      >🏦 MORTGAGE</button>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="screen-win" class="screen">
  <div class="win-token" id="win-token"></div>
  <div class="win-title">🏆 WINNER!</div>
  <div class="win-name"  id="win-name"></div>
  <div class="win-money" id="win-money"></div>
  <button class="btn" onclick="location.reload()">↩ PLAY AGAIN</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-title"   id="modal-title"></div>
    <div class="modal-body"    id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API — no files)
// ════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function getACtx() {
  if (!actx) actx = new AudioCtx();
  return actx;
}

function playTone(freq, type, duration, gain = 0.18, startDelay = 0) {
  try {
    const ctx = getACtx();
    const osc = ctx.createOscillator();
    const gn  = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
    gn.gain.setValueAtTime(gain, ctx.currentTime + startDelay);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + duration);
    osc.start(ctx.currentTime + startDelay);
    osc.stop(ctx.currentTime  + startDelay + duration + 0.01);
  } catch(e) {}
}

function playNoise(duration, gain = 0.06) {
  try {
    const ctx = getACtx();
    const bufSz = ctx.sampleRate * duration;
    const buf   = ctx.createBuffer(1, bufSz, ctx.sampleRate);
    const data  = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gn = ctx.createGain();
    gn.gain.setValueAtTime(gain, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(gn); gn.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function squareGridPos(id) {
  if (id === 0)  return [10,10];
  if (id === 10) return [10,0];
  if (id === 20) return [0,0];
  if (id === 30) return [0,10];
  if (id >= 1  && id <= 9)  return [10, 10-id];
  if (id >= 11 && id <= 19) return [10-(id-10), 0];
  if (id >= 21 && id <= 29) return [0, id-20];
  if (id >= 31 && id <= 39) return [id-30, 10];
  return [5,5];
}

function buildBoard() {
  const board = document.getElementById('board');
  board.querySelectorAll('.cell').forEach(c => c.remove());

  for (let row = 0; row < 11; row++) {
    for (let col = 0; col < 11; col++) {
      if (row >= 1 && row <= 9 && col >= 1 && col <= 9) continue;
      const sq = SQUARES.find(s => { const [r,c] = squareGridPos(s.id); return r===row && c===col; });
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.gridRow    = `${row+1}`;
      cell.style.gridColumn = `${col+1}`;
      if (sq) { cell.id = `cell-${sq.id}`; cell.title = sq.name; buildCellContent(cell, sq); }
      else { cell.style.background = '#0a0a0f'; }
      board.insertBefore(cell, document.getElementById('tokens-layer'));
    }
  }

  if (!board.querySelector('.board-center')) {
    const center = document.createElement('div');
    center.className = 'board-center';
    center.style.gridColumn = '2/11'; center.style.gridRow = '2/11';
    center.innerHTML = `
      <div class="board-title">PIXEL<br>ESTATES</div>
      <div class="board-subtitle">♦ PROPERTY TRADING ♦</div>
      <div class="dice-area"><div class="die" id="die1">⚀</div><div class="die" id="die2">⚀</div></div>
    `;
    board.insertBefore(center, document.getElementById('tokens-layer'));
  }
}

const DIE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

function buildCellContent(cell, sq) {
  cell.innerHTML = '';
  if ([0,10,20,30].includes(sq.id)) {
    cell.classList.add('cell-corner');
    const labels = {0:'🟢\nGO', 10:'⛓\nJAIL', 20:'🅿\nFREE\nPARK', 30:'👮\nGO TO\nJAIL'};
    const label = document.createElement('div');
    label.className = 'corner-label'; label.style.whiteSpace = 'pre';
    label.textContent = labels[sq.id];
    cell.appendChild(label); return;
  }
  if (sq.type === 'property') {
    const bar = document.createElement('div'); bar.className = 'cell-color-bar';
    bar.style.background = COLOR_GROUPS[sq.group] || '#888'; cell.appendChild(bar);
  }
  const icons = {chance:'?',community:'📦',railroad:'🚂',utility:'⚡',tax:'💸',parking:'🅿',jail:'⛓'};
  const nameEl = document.createElement('div'); nameEl.className = 'cell-name';
  nameEl.textContent = (icons[sq.type] ? icons[sq.type]+' ' : '') + sq.name; cell.appendChild(nameEl);
  if (sq.price) {
    const priceEl = document.createElement('div'); priceEl.className = 'cell-price';
    priceEl.textContent = '$'+sq.price; cell.appendChild(priceEl);
  }
  ['chance','community','tax','railroad','utility'].forEach(t => { if (sq.type===t) cell.classList.add('cell-'+t); });
  const dot = document.createElement('div'); dot.className = 'owner-dot'; dot.id = `dot-${sq.id}`; cell.appendChild(dot);
  const hi  = document.createElement('div'); hi.className  = 'house-icon'; hi.id  = `house-${sq.id}`; cell.appendChild(hi);
}

function buildSidebars() {
  const left = document.getElementById('side-left');
  const right= document.getElementById('side-right');
  left.innerHTML = ''; right.innerHTML = '';
  G.players.forEach((p, i) => {
    const card = document.createElement('div');
    card.id = `pcard-${i}`;
    if (i < 2) left.appendChild(card); else right.appendChild(card);
  });
  const logPanel = document.createElement('div');
  logPanel.className = 'log-panel'; logPanel.id = 'log-panel';
  right.appendChild(logPanel);
  updateSidebars();
}

function updateSidebars() {
  G.players.forEach((p, i) => {
    const card = document.getElementById(`pcard-${i}`);
    if (!card) return;
    const props = Object.entries(G.ownership).filter(([,o]) => o===i).length;
    const mortgCount = Object.entries(G.mortgaged).filter(([sqId,v]) => v && G.ownership[sqId]===i).length;
    const isActive = i === G.current;
    const statusClass = p.bankrupt ? '' : p.inJail ? 'status-jail' : isActive ? 'status-active' : 'status-waiting';
    const statusLabel = p.bankrupt ? 'BANKRUPT' : p.inJail ? 'IN JAIL' : isActive ? 'ACTIVE' : 'WAITING';
    card.className = `player-card${isActive?' active-turn':''}${p.bankrupt?' bankrupt':''}`;
    card.innerHTML = `
      <div class="pc-header">
        <div class="pc-token">${p.token}</div>
        <div class="pc-name">${p.name}</div>
        <div class="pc-tag" style="color:${p.color};border-color:${p.color}">P${i+1}</div>
      </div>
      <div class="pc-money">$${p.money.toLocaleString()}</div>
      <div class="pc-props">🏠 ${props} PROPS${mortgCount>0?` · 🏦 ${mortgCount} MRTG`:''}</div>
      ${p.jailFreeCards>0?`<div class="pc-props">🎫 ${p.jailFreeCards} JAIL FREE</div>`:''}
      <div class="pc-status ${statusClass}">${statusLabel}</div>
    `;
  });
}

function renderTokens() {
  const layer = document.getElementById('tokens-layer');
  layer.innerHTML = '';
  G.players.forEach((p, i) => {
    if (p.bankrupt) return;
    const tok = document.createElement('div');
    tok.className = 'token'; tok.id = `token-${i}`;
    tok.textContent = p.token; tok.style.background = p.color;
    positionToken(tok, p.pos, i);
    layer.appendChild(tok);
  });
}

function positionToken(tokEl, sqId, playerIdx) {
  const cellEl = document.getElementById(`cell-${sqId}`);
  if (!cellEl) return;
  const br = document.getElementById('board').getBoundingClientRect();
  const cr = cellEl.getBoundingClientRect();
  tokEl.style.left = (cr.left - br.left + 2 + (playerIdx%2)*8) + 'px';
  tokEl.style.top  = (cr.top  - br.top  + 2 + Math.floor(playerIdx/2)*8) + 'px';
}

function moveTokenTo(playerIdx, sqId) {
  const tok = document.getElementById(`token-${playerIdx}`);
  if (tok) positionToken(tok, sqId, playerIdx);
}

function updateOwnerDot(sqId, playerIdx) {
  const dot = document.getElementById(`dot-${sqId}`);
  if (!dot) return;
  if (playerIdx !== null && playerIdx !== undefined) {
    dot.style.background = G.players[playerIdx].color;
    dot.style.border = '1px solid #fff';
  } else {
    dot.style.background = 'transparent'; dot.style.border = 'none';
  }
}

function updateHouseDisplay(sqId) {
  const hEl = document.getElementById(`house-${sqId}`);
  if (!hEl) return;
  const count = G.houses[sqId] || 0;
  hEl.textContent = count === 0 ? '' : count === 5 ? '🏨' : '🏠'.repeat(count);
}

function updateMortgageDisplay(sqId) {
  const cell = document.getElementById(`cell-${sqId}`);
  if (!cell) return;
  if (G.mortgaged[sqId]) cell.classList.add('mortgaged-cell');
  else cell.classList.remove('mortgaged-cell');
}

  document.getElementById('btn-trade').style.display = (G.phase==='end' && activePlayers.length >= 2) ? '' : 'none';

  G.players.forEach((_, i) => {
    const tok = document.getElementById(`token-${i}`);
    if (tok) positionToken(tok, G.players[i].pos, i);
  });
}

// ── ROLL ──
document.getElementById('btn-roll').addEventListener('click', () => {
  if (G.phase !== 'roll') return;
  SFX.roll();
  rollDice();
});

function rollDice() {
  const p = currentPlayer();
  const d1 = Math.ceil(Math.random()*6);
  const d2 = Math.ceil(Math.random()*6);
  G.dice = [d1, d2];
  const total = d1+d2, isDoubles = d1===d2;

  ['die1','die2'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('rolling'); void el.offsetWidth; el.classList.add('rolling');
  });
  setTimeout(() => {
    document.getElementById('die1').textContent = DIE_FACES[d1-1];
    document.getElementById('die2').textContent = DIE_FACES[d2-1];
  }, 200);

  log(`${p.token} ${p.name} rolls ${d1}+${d2}=${total}${isDoubles?' DOUBLES!':''}`, 'event');

  if (p.inJail) {
    if (isDoubles) {
      p.inJail = false; p.jailTurns = 0;
      log(`${p.name} rolled doubles — FREE from jail!`,'jail');
      setTimeout(() => doMove(p, total), 500);
    } else {
      p.jailTurns++;
      if (p.jailTurns >= 3) {
        p.inJail = false; p.jailTurns = 0; p.money -= 50;
        log(`${p.name} paid $50 fine after 3 jail turns`,'jail');
        setTimeout(() => doMove(p, total), 500);
      } else {
        log(`${p.name} stays in jail (turn ${p.jailTurns}/3)`,'jail');
        G.phase = 'end'; updateUI();
      }
    }
    return;
  }
  setTimeout(() => doMove(p, total), 500);
}

function doMove(p, steps) {
  const oldPos = p.pos;
  const newPos = (p.pos + steps) % 40;
  if (newPos < oldPos && newPos !== 0) collectGo(p);
  p.pos = newPos;
  SFX.move();
  moveTokenTo(p.index, newPos);
  G.phase = 'landed';
  updateUI();
  setTimeout(() => landOnSquare(p), 400);
}

function collectGo(p) {
  p.money += 200;
  SFX.go();
  log(`${p.token} ${p.name} passes GO — collect $200!`,'bank');
}

function sendToJail(p) {
  p.inJail = true; p.jailTurns = 0; p.pos = 10;
  moveTokenTo(p.index, 10);
  SFX.jail();
  log(`${p.token} ${p.name} goes to JAIL!`,'jail');
  G.phase = 'end'; updateUI();
}

function moveToSquare(p, sqId) {
  if (sqId < p.pos && sqId !== 30) collectGo(p);
  p.pos = sqId;
  moveTokenTo(p.index, sqId);
}

function landOnSquare(p) {
  const sq = SQUARES[p.pos];
  log(`${p.token} ${p.name} lands on ${sq.name}`, '');
  switch(sq.type) {
    case 'go':        G.phase='end'; updateUI(); break;
    case 'jail':      G.phase='end'; updateUI(); break;
    case 'parking':   handleParking(p); break;
    case 'gotojail':  sendToJail(p); break;
    case 'tax':       handleTax(p, sq); break;
    case 'chance':    handleChance(p); break;
    case 'community': handleCommunity(p); break;
    case 'railroad':  handleRailroad(p, sq); break;
    case 'utility':   handleUtility(p, sq); break;
    case 'property':  handleProperty(p, sq); break;
    default:          G.phase='end'; updateUI();
  }
}

// ════════════════════════════════════════════
//  SQUARE HANDLERS
// ════════════════════════════════════════════
function handleParking(p) {
  if (G.parkingPot > 0) {
    SFX.go();
    log(`${p.name} collects FREE PARKING pot: $${G.parkingPot}!`,'bank');
    p.money += G.parkingPot; G.parkingPot = 0;
  }
  G.phase = 'end'; updateUI();
}

function handleTax(p, sq) {
  p.money -= sq.amount; G.parkingPot += sq.amount;
  SFX.rent();
  log(`${p.name} pays ${sq.name}: $${sq.amount}`,'rent');
  checkBankruptcy(p, () => { G.phase='end'; updateUI(); });
}

function handleChance(p) {
  const card = CHANCE_CARDS[G.chanceIdx % CHANCE_CARDS.length]; G.chanceIdx++;
  SFX.card();
  showModal('⚡ CHANCE CARD','', [
    { label:'OK', cls:'btn-blue btn-sm', action:() => { closeModal(); card.action(p); setTimeout(()=>{ G.phase='end'; updateUI(); },300); } }
  ], 'chance', card.text);
}

function handleCommunity(p) {
  const card = COMMUNITY_CARDS[G.communityIdx % COMMUNITY_CARDS.length]; G.communityIdx++;
  SFX.card();
  showModal('📦 COMMUNITY CHEST','', [
    { label:'OK', cls:'btn-green btn-sm', action:() => { closeModal(); card.action(p); setTimeout(()=>{ G.phase='end'; updateUI(); },300); } }
  ], 'community', card.text);
}

function handleRailroad(p, sq) {
  if (G.mortgaged[sq.id]) { log(`${sq.name} is mortgaged — no rent`,''); G.phase='end'; updateUI(); return; }
  const owner = G.ownership[sq.id];
  if (owner === undefined) {
    if (p.money >= sq.price) showBuyModal(p, sq, () => {
      G.ownership[sq.id]=p.index; p.money -= sq.price;
      SFX.buy(); log(`${p.name} buys ${sq.name} for $${sq.price}`,'buy');
      updateOwnerDot(sq.id, p.index); G.phase='end'; updateUI();
    }, () => { G.phase='end'; updateUI(); });
    else { G.phase='end'; updateUI(); }
  } else if (owner !== p.index) {
    const ownerRRs = SQUARES.filter(s => s.type==='railroad' && G.ownership[s.id]===owner && !G.mortgaged[s.id]).length;
    const rent = sq.rent[Math.max(0, ownerRRs-1)];
    payRent(p, owner, rent, sq.name);
  } else { offerHouseBuild(p, sq); }
}

function handleUtility(p, sq) {
  if (G.mortgaged[sq.id]) { log(`${sq.name} is mortgaged — no rent`,''); G.phase='end'; updateUI(); return; }
  const owner = G.ownership[sq.id];
  if (owner === undefined) {
    if (p.money >= sq.price) showBuyModal(p, sq, () => {
      G.ownership[sq.id]=p.index; p.money -= sq.price;
      SFX.buy(); log(`${p.name} buys ${sq.name} for $${sq.price}`,'buy');
      updateOwnerDot(sq.id, p.index); G.phase='end'; updateUI();
    }, () => { G.phase='end'; updateUI(); });
    else { G.phase='end'; updateUI(); }
  } else if (owner !== p.index) {
    const ownerUtils = SQUARES.filter(s => s.type==='utility' && G.ownership[s.id]===owner && !G.mortgaged[s.id]).length;
    const rent = (G.dice[0]+G.dice[1]) * (ownerUtils===2 ? 10 : 4);
    payRent(p, owner, rent, sq.name);
  } else { G.phase='end'; updateUI(); }
}

function handleProperty(p, sq) {
  if (G.mortgaged[sq.id]) { log(`${sq.name} is mortgaged — no rent`,''); G.phase='end'; updateUI(); return; }
  const owner = G.ownership[sq.id];
  if (owner === undefined) {
    if (p.money >= sq.price) showBuyModal(p, sq, () => {
      G.ownership[sq.id]=p.index; p.money -= sq.price;
      SFX.buy(); log(`${p.name} buys ${sq.name} for $${sq.price}`,'buy');
      updateOwnerDot(sq.id, p.index); G.phase='end'; updateUI();
    }, () => { G.phase='end'; updateUI(); });
    else { log(`${p.name} can't afford ${sq.name}`,''); G.phase='end'; updateUI(); }
  } else if (owner !== p.index) {
    const houses = G.houses[sq.id] || 0;
    let rent = sq.rent[houses];
    if (houses === 0) {
      const grpSqs = SQUARES.filter(s => s.group===sq.group);
      if (grpSqs.every(s => G.ownership[s.id]===owner && !G.mortgaged[s.id])) rent *= 2;
    }
    payRent(p, owner, rent, sq.name);
  } else { offerHouseBuild(p, sq); }
}

function payRent(payer, ownerIdx, rent, sqName) {
  const owner = G.players[ownerIdx];
  const actual = Math.min(rent, payer.money);
  payer.money -= actual; owner.money += actual;
  SFX.rent();
  log(`${payer.name} pays $${actual} rent to ${owner.name} for ${sqName}`,'rent');
  checkBankruptcy(payer, () => { G.phase='end'; updateUI(); });
}

function checkBankruptcy(p, cb) {
  if (p.money <= 0) {
    p.bankrupt = true; p.money = 0;
    SFX.bankrupt();
    log(`💀 ${p.name} IS BANKRUPT!`,'event');
    Object.keys(G.ownership).forEach(sqId => {
      if (G.ownership[sqId] === p.index) {
        delete G.ownership[sqId]; delete G.mortgaged[sqId]; delete G.houses[sqId];
        updateOwnerDot(parseInt(sqId), null);
        updateHouseDisplay(parseInt(sqId));
        updateMortgageDisplay(parseInt(sqId));
      }
    });
    const tok = document.getElementById(`token-${p.index}`);
    if (tok) tok.remove();
    updateSidebars();
    const active = G.players.filter(pl => !pl.bankrupt);
    if (active.length === 1) { showWinner(active[0]); return; }
    cb();
  } else { cb(); }
}

function showWinner(p) {
  SFX.win();
  document.getElementById('win-token').textContent = p.token;
  document.getElementById('win-name').textContent  = p.name + ' WINS!';
  document.getElementById('win-money').textContent = `FINAL BALANCE: $${p.money.toLocaleString()}`;
  showScreen('win');
}

// ── HOUSE BUILD ──
function offerHouseBuild(p, sq) {
  if (sq.type !== 'property') { G.phase='end'; updateUI(); return; }
  if (G.mortgaged[sq.id])     { G.phase='end'; updateUI(); return; }
  const grpSqs = SQUARES.filter(s => s.group===sq.group);
  const monopoly = grpSqs.every(s => G.ownership[s.id]===p.index);
  if (!monopoly) { G.phase='end'; updateUI(); return; }
  const houses = G.houses[sq.id] || 0;
  if (houses >= 5) { G.phase='end'; updateUI(); return; }
  const houseCost = sq.price / 2;
  if (p.money < houseCost) { G.phase='end'; updateUI(); return; }
  const label = houses < 4 ? `BUILD HOUSE ($${houseCost})` : `BUILD HOTEL ($${houseCost})`;
  showModal(`🏠 ${sq.name}`, `You own this! Build ${houses<4?'a house':'a hotel'}?`, [
    { label, cls:'btn-green btn-sm', action:() => {
      closeModal(); p.money -= houseCost; G.houses[sq.id] = houses+1;
      SFX.house(); updateHouseDisplay(sq.id);
      log(`${p.name} builds ${houses<4?'house':'hotel'} on ${sq.name}`,'buy');
      G.phase='end'; updateUI();
    }},
    { label:'SKIP', cls:'btn-dim btn-sm', action:() => { closeModal(); G.phase='end'; updateUI(); } }
  ]);
}

// ── END TURN ──
document.getElementById('btn-end-turn').addEventListener('click', () => { SFX.click(); endTurn(); });

function endTurn() {
  let next = (G.current+1) % G.players.length, safety = 0;
  while (G.players[next].bankrupt && safety < G.players.length) {
    next = (next+1) % G.players.length; safety++;
  }
  G.current = next; G.phase = 'roll';
  updateUI();
  log(`— ${G.players[G.current].token} ${G.players[G.current].name}'S TURN —`,'event');
}

// ── BAIL ──
document.getElementById('btn-bail-jail').addEventListener('click', () => {
  const p = currentPlayer();
  if (!p.inJail) return;
  SFX.click();
  if (p.jailFreeCards > 0) {
    p.jailFreeCards--; p.inJail=false; p.jailTurns=0;
    log(`${p.name} uses Jail Free card!`,'jail');
    G.phase='roll'; updateUI();
  } else if (p.money >= 50) {
    p.money -= 50; p.inJail=false; p.jailTurns=0; G.parkingPot += 50;
    log(`${p.name} pays $50 bail!`,'jail');
    G.phase='roll'; updateUI();
  }
});

  SFX.click();
  openMortgageModal();

function openMortgageModal() {
  const p = currentPlayer();
  // Gather all properties owned by current player
  const ownedSqs = SQUARES.filter(s =>
    (s.type==='property'||s.type==='railroad'||s.type==='utility') &&
    G.ownership[s.id] === p.index
  );

  if (ownedSqs.length === 0) {
    showModal('🏦 MORTGAGE', '', [
      { label:'CLOSE', cls:'btn-dim btn-sm', action:closeModal }
    ], null, '');
    document.getElementById('modal-body').innerHTML = `
      <div style="font-family:VT323,monospace;font-size:15px;color:var(--dim)">You own no properties to mortgage.</div>
    `;
    return;
  }

  document.getElementById('modal-title').textContent = '🏦 MORTGAGE / UNMORTGAGE';
  const bodyEl = document.getElementById('modal-body');
  bodyEl.innerHTML = `
    <div style="font-family:VT323,monospace;font-size:12px;color:var(--dim);margin-bottom:8px;text-align:left">
      Mortgage: receive half value. Unmortgage: pay back + 10% interest.
    </div>
    <div class="mort-list" id="mort-list"></div>
    <div style="font-family:VT323,monospace;font-size:14px;color:var(--green);margin-top:8px">
      YOUR BALANCE: <span id="mort-balance">$${p.money}</span>
    </div>
  `;

  const actionsEl = document.getElementById('modal-actions');
  actionsEl.innerHTML = '';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn btn-dim btn-sm'; closeBtn.textContent = 'DONE';
  closeBtn.addEventListener('click', () => { closeModal(); updateUI(); });
  actionsEl.appendChild(closeBtn);

  document.getElementById('modal-overlay').classList.add('open');
  renderMortgageList(p, ownedSqs);
}

function renderMortgageList(p, ownedSqs) {
  const list = document.getElementById('mort-list');
  if (!list) return;
  list.innerHTML = '';

  ownedSqs.forEach(sq => {
    const isMortgaged = !!G.mortgaged[sq.id];
    const mortValue   = sq.mortgage || Math.floor(sq.price/2);
    const unmortCost  = Math.floor(mortValue * 1.1);
    const hasHouses   = (G.houses[sq.id] || 0) > 0;

    const item = document.createElement('div');
    item.className = `mort-item${isMortgaged?' is-mortgaged':''}`;

    const colorHex = sq.group ? COLOR_GROUPS[sq.group] : (sq.type==='railroad'?'#888':'#3a3');
    item.innerHTML = `
      <div class="mi-dot" style="background:${colorHex};border:1px solid #fff"></div>
      <div class="mi-name">${sq.name}</div>
      <div class="mi-val">${isMortgaged ? `UNMORTGAGE $${unmortCost}` : `MORTGAGE +$${mortValue}`}</div>
    `;

    const actionBtn = document.createElement('button');
    actionBtn.className = `btn btn-xs ${isMortgaged ? 'btn-green' : 'btn-mortgaged'}`;
    actionBtn.textContent = isMortgaged ? '↑ LIFT' : '↓ MORT';

    if (!isMortgaged && hasHouses) {
      actionBtn.disabled = true;
      actionBtn.title = 'Sell houses first!';
      actionBtn.style.opacity = '0.4';
    }

    actionBtn.addEventListener('click', () => {
      if (isMortgaged) {
        // Unmortgage
        if (p.money < unmortCost) { SFX.rent(); return; }
        p.money -= unmortCost;
        delete G.mortgaged[sq.id];
        SFX.unmort();
        log(`${p.name} lifts mortgage on ${sq.name} for $${unmortCost}`,'mortgage');
      } else {
        // Mortgage
        if (hasHouses) return;
        G.mortgaged[sq.id] = true;
        p.money += mortValue;
        SFX.mortgage();
        log(`${p.name} mortgages ${sq.name} for $${mortValue}`,'mortgage');
      }
      updateMortgageDisplay(sq.id);
      document.getElementById('mort-balance').textContent = '$'+p.money;
      updateSidebars();
      // Re-render list
      renderMortgageList(p, ownedSqs);
    });

    item.appendChild(actionBtn);
    list.appendChild(item);
  });
}

  SFX.click();
  openTradeModal();
});

function openTradeModal() {
  const p = currentPlayer();
  const activePlayers = G.players.filter(pl => !pl.bankrupt && pl.index !== p.index);

  if (activePlayers.length === 0) {
    showModal('🤝 TRADE','No other players to trade with.',[{ label:'CLOSE', cls:'btn-dim btn-sm', action:closeModal }]);
    return;
  }

  // Step 1: choose trade partner
  document.getElementById('modal-title').textContent = '🤝 PROPOSE TRADE';
  const bodyEl = document.getElementById('modal-body');
  bodyEl.innerHTML = `<div style="font-family:VT323,monospace;font-size:14px;color:var(--dim)">Choose a player to trade with:</div>`;
  const actionsEl = document.getElementById('modal-actions');
  actionsEl.innerHTML = '';

  activePlayers.forEach(target => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm'; btn.style.background = target.color; btn.style.color='#000';
    btn.textContent = `${target.token} ${target.name}`;
    btn.addEventListener('click', () => openTradeBuilder(p, target));
    actionsEl.appendChild(btn);
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-dim btn-sm'; cancelBtn.textContent = 'CANCEL';
  cancelBtn.addEventListener('click', closeModal);
  actionsEl.appendChild(cancelBtn);

  document.getElementById('modal-overlay').classList.add('open');
}

function openTradeBuilder(proposer, target) {
  // State for trade
  const tradeState = {
    fromProps: new Set(),  // sqIds proposer is offering
    toProps:   new Set(),  // sqIds target is offering
    fromCash:  0,
    toCash:    0,
  };

  function getPlayerProps(player) {
    return SQUARES.filter(s =>
      (s.type==='property'||s.type==='railroad'||s.type==='utility') &&
      G.ownership[s.id] === player.index
    );
  }

  function renderBuilder() {
    document.getElementById('modal-title').textContent = `🤝 ${proposer.name} ↔ ${target.name}`;
    const bodyEl = document.getElementById('modal-body');

    const fromProps = getPlayerProps(proposer);
    const toProps   = getPlayerProps(target);

    bodyEl.innerHTML = `
      <div class="trade-layout">
        <div class="trade-col">
          <h3 style="color:${proposer.color}">${proposer.token} ${proposer.name}</h3>
          <div class="trade-label">BALANCE: $${proposer.money}</div>
          <div class="trade-label">OFFER CASH:</div>
          <input class="trade-cash-input" id="trade-from-cash" type="number" min="0" max="${proposer.money}" value="${tradeState.fromCash}" placeholder="$0">
          <div class="trade-label">OFFER PROPS:</div>
          <div class="trade-prop-list" id="trade-from-props">
            ${fromProps.length === 0 ? '<div style="color:var(--dim);font-family:VT323,monospace;font-size:12px">No properties</div>' : ''}
          </div>
        </div>
        <div class="trade-divider">⇄</div>
        <div class="trade-col">
          <h3 style="color:${target.color}">${target.token} ${target.name}</h3>
          <div class="trade-label">BALANCE: $${target.money}</div>
          <div class="trade-label">WANTS CASH:</div>
          <input class="trade-cash-input" id="trade-to-cash" type="number" min="0" max="${target.money}" value="${tradeState.toCash}" placeholder="$0">
          <div class="trade-label">WANTS PROPS:</div>
          <div class="trade-prop-list" id="trade-to-props">
            ${toProps.length === 0 ? '<div style="color:var(--dim);font-family:VT323,monospace;font-size:12px">No properties</div>' : ''}
          </div>
        </div>
      </div>
    `;

    // Render prop lists
    function renderPropList(containerId, props, selectedSet, playerColor) {
      const container = document.getElementById(containerId);
      props.forEach(sq => {
        const colorHex = sq.group ? COLOR_GROUPS[sq.group] : (sq.type==='railroad'?'#666':'#3a3');
        const isSel = selectedSet.has(sq.id);
        const isMortg = !!G.mortgaged[sq.id];
        const item = document.createElement('div');
        item.className = `trade-prop-item${isSel?' selected':''}`;
        item.innerHTML = `
          <div class="tpi-dot" style="background:${colorHex};border:1px solid #fff"></div>
          <span>${sq.name}</span>
          ${isMortg ? '<span class="tpi-mortg">MRTG</span>' : ''}
        `;
        item.addEventListener('click', () => {
          SFX.click();
          if (selectedSet.has(sq.id)) selectedSet.delete(sq.id);
          else selectedSet.add(sq.id);
          renderBuilder();
        });
        container.appendChild(item);
      });
    }

    renderPropList('trade-from-props', fromProps, tradeState.fromProps, proposer.color);
    renderPropList('trade-to-props',   toProps,   tradeState.toProps,   target.color);

    // Cash input listeners
    document.getElementById('trade-from-cash').addEventListener('input', e => {
      tradeState.fromCash = Math.max(0, Math.min(parseInt(e.target.value)||0, proposer.money));
    });
    document.getElementById('trade-to-cash').addEventListener('input', e => {
      tradeState.toCash = Math.max(0, Math.min(parseInt(e.target.value)||0, target.money));
    });

    // Actions
    const actionsEl = document.getElementById('modal-actions');
    actionsEl.innerHTML = '';

    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn-green btn-sm'; confirmBtn.textContent = '✓ CONFIRM TRADE';
    confirmBtn.addEventListener('click', () => {
      const fromCash = parseInt(document.getElementById('trade-from-cash').value)||0;
      const toCash   = parseInt(document.getElementById('trade-to-cash').value)||0;

      if (fromCash > proposer.money || toCash > target.money) {
        SFX.rent();
        return;
      }

      executeTrade(proposer, target, tradeState.fromProps, tradeState.toProps, fromCash, toCash);
    });
    actionsEl.appendChild(confirmBtn);

    const backBtn = document.createElement('button');
    backBtn.className = 'btn btn-dim btn-sm'; backBtn.textContent = '← BACK';
    backBtn.addEventListener('click', () => openTradeModal());
    actionsEl.appendChild(backBtn);
  }

  renderBuilder();
}

function executeTrade(proposer, target, fromProps, toProps, fromCash, toCash) {
  // Transfer properties proposer → target
  fromProps.forEach(sqId => {
    G.ownership[sqId] = target.index;
    // Remove houses if any (mortgaged stays as-is, transferred)
    if (G.houses[sqId]) delete G.houses[sqId];
    updateOwnerDot(sqId, target.index);
    updateHouseDisplay(sqId);
  });

  // Transfer properties target → proposer
  toProps.forEach(sqId => {
    G.ownership[sqId] = proposer.index;
    if (G.houses[sqId]) delete G.houses[sqId];
    updateOwnerDot(sqId, proposer.index);
    updateHouseDisplay(sqId);
  });

  // Transfer cash
  proposer.money = proposer.money - fromCash + toCash;
  target.money   = target.money   - toCash  + fromCash;

  SFX.trade();

  const propNames = [...fromProps].map(id => SQUARES[id]?.name).join(', ');
  const toPropNames = [...toProps].map(id => SQUARES[id]?.name).join(', ');
  const parts = [];
  if (fromProps.size > 0) parts.push(`${proposer.name} gives ${propNames}`);
  if (fromCash > 0)       parts.push(`${proposer.name} gives $${fromCash}`);
  if (toProps.size > 0)   parts.push(`${target.name} gives ${toPropNames}`);
  if (toCash > 0)         parts.push(`${target.name} gives $${toCash}`);
  log(`TRADE: ${parts.join(' | ')}`,'trade');

  closeModal();
  updateUI();
}

// ════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════
function showModal(title, body, buttons, cardType, cardText) {
  document.getElementById('modal-title').textContent = title;
  const bodyEl = document.getElementById('modal-body');
  if (cardType) {
    bodyEl.innerHTML = `<div class="modal-card ${cardType}">${cardText||body}</div>`;
  } else {
    bodyEl.textContent = body;
  }
  const actionsEl = document.getElementById('modal-actions');
  actionsEl.innerHTML = '';
  buttons.forEach(btn => {
    const b = document.createElement('button');
    b.className = `btn ${btn.cls||''}`; b.textContent = btn.label;
    b.addEventListener('click', btn.action);
    actionsEl.appendChild(b);
  });
  document.getElementById('modal-overlay').classList.add('open');
}

function showBuyModal(p, sq, onBuy, onSkip) {
  const colorHex = sq.group ? COLOR_GROUPS[sq.group] : '#888';
  document.getElementById('modal-title').textContent = `🏠 ${sq.name}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="prop-color-banner" style="background:${colorHex}"></div>
    <div class="prop-detail">PRICE: <span>$${sq.price}</span></div>
    <div class="prop-detail">YOUR BALANCE: <span style="color:var(--green)">$${p.money}</span></div>
    <div class="prop-detail">BASE RENT: <span>$${sq.rent ? sq.rent[0] : 'N/A'}</span></div>
    <br>
    <div style="font-family:VT323,monospace;font-size:15px;color:#aaa">Buy this property?</div>
  `;
  const actionsEl = document.getElementById('modal-actions');
  actionsEl.innerHTML = '';
  const buyBtn = document.createElement('button');
  buyBtn.className = 'btn btn-green btn-sm'; buyBtn.textContent = `BUY $${sq.price}`;
  buyBtn.addEventListener('click', () => { closeModal(); onBuy(); });
  actionsEl.appendChild(buyBtn);
  const skipBtn = document.createElement('button');
  skipBtn.className = 'btn btn-dim btn-sm'; skipBtn.textContent = 'PASS';
  skipBtn.addEventListener('click', () => { closeModal(); onSkip(); });
  actionsEl.appendChild(skipBtn);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}

window.addEventListener('resize', () => {
  if (document.getElementById('screen-game').classList.contains('active')) {
    G.players.forEach((_, i) => {
      const tok = document.getElementById(`token-${i}`);
      if (tok) positionToken(tok, G.players[i].pos, i);
    });
  }
});

function shuffleCards() {
  for (let i = CHANCE_CARDS.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [CHANCE_CARDS[i],CHANCE_CARDS[j]] = [CHANCE_CARDS[j],CHANCE_CARDS[i]];
  }
  for (let i = COMMUNITY_CARDS.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [COMMUNITY_CARDS[i],COMMUNITY_CARDS[j]] = [COMMUNITY_CARDS[j],COMMUNITY_CARDS[i]];
  }
}
shuffleCards();
</script>
